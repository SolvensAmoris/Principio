<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solvens Amoris | Enlaces</title>
    
    <!-- Fuentes tipográficas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de colores basada en tu imagen */
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --purple-dark: #1a053a;
            --purple-light: #9b72cf;
            --bg-black: #06010f;
            --text-muted: #a99bbd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-black);
            /* Degradado cósmico imitando el fondo de la cueva */
            background-image: radial-gradient(circle at top, var(--purple-dark) 0%, var(--bg-black) 60%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contenedor principal que imita la pantalla del celular */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Encabezado --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        /* Símbolo central (Astrolabio simplificado) */
        .astrolabe-placeholder {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            color: var(--gold-light);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* --- Enlaces / Botones --- */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; /* Bordes redondeados sutiles */
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Estilo específico para el botón principal (Dorado) */
        .link-btn.gold {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
        }

        /* Estilo para botones secundarios (Morado/Plata) */
        .link-btn.purple {
            border-color: rgba(155, 114, 207, 0.4);
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        /* Efectos visuales de las esquinas imitando el marco de la imagen */
        .link-btn::before, .link-btn::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid transparent;
        }
        
        .link-btn.gold::before {
            top: 5px; left: 5px;
            border-top-color: var(--gold); border-left-color: var(--gold);
        }
        .link-btn.gold::after {
            bottom: 5px; right: 5px;
            border-bottom-color: var(--gold); border-right-color: var(--gold);
        }

        .icon {
            font-size: 1.5rem;
            margin-right: 20px;
            min-width: 30px;
            text-align: center;
        }

        .link-btn.gold .icon { color: var(--gold); }
        .link-btn.purple .icon { color: var(--text-muted); }

        .text-content {
            display: flex;
            flex-direction: column;
        }

        .main-text {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .link-btn.gold .main-text { color: var(--gold-light); }
        .link-btn.purple .main-text { color: #ffffff; }

        .sub-text {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* --- Footer --- */
        .footer {
            text-align: center;
            width: 100%;
            margin-top: auto;
        }

        .quote {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold-light);
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .moon-phases {
            font-size: 1.1rem;
            letter-spacing: 10px;
            margin-bottom: 25px;
            opacity: 0.6;
            color: var(--purple-light);
        }

        .seal {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .copyright {
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <!-- Encabezado -->
        <header class="header">
            <div class="astrolabe-placeholder">❂</div>
            <h1 class="title">Solvens Amoris</h1>
            <p class="tagline">TECNOLOGÍA &bull; CONCIENCIA &bull; MAGIA &bull; DESTINO</p>
        </header>

        <!-- Botones -->
        <main class="links-wrapper">
            
            <!-- 1. Libro (Activo) -->
            <a href="ENLACE_A_TU_LIBRO_AQUI" class="link-btn gold">
                <div class="icon">📖</div>
                <div class="text-content">
                    <span class="main-text">COMPRAR MI LIBRO</span>
                    <span class="sub-text">EL LENGUAJE DE LA VID</span>
                </div>
            </a>

            <!-- 2. Reloj (Activo) -->
            <a href="ENLACE_A_TU_RELOJ_AQUI" class="link-btn purple">
                <div class="icon">🧭</div>
                <div class="text-content">
                    <span class="main-text">PROBAR EL RELOJ ASTROLÓGICO</span>
                    <span class="sub-text">INTERPRETA TU DESTINO</span>
                </div>
            </a>

            <!-- 3. WhatsApp (Pendiente) -->
            <a href="#" class="link-btn purple">
                <div class="icon">💬</div>
                <div class="text-content">
                    <span class="main-text">WHATSAPP</span>
                    <span class="sub-text">CONECTEMOS</span>
                </div>
            </a>

            <!-- 4. Contacto (Pendiente) -->
            <a href="#" class="link-btn purple">
                <div class="icon">✉️</div>
                <div class="text-content">
                    <span class="main-text">CONTACTO</span>
                    <span class="sub-text">ESCRÍBEME</span>
                </div>
            </a>

        </main>

        <!-- Pie de página -->
        <footer class="footer">
            <p class="quote">"LO QUE BUSCAS, TAMBIÉN TE BUSCA."</p>
            <div class="moon-phases">🌑🌒🌓🌔🌕🌖🌗🌘</div>
            <div class="seal">S</div>
            <div class="copyright">
                SOLVENS AMORIS<br>
                TODOS LOS DERECHOS RESERVADOS<br>
                &copy; 2026
            </div>
        </footer>

    </div>

</body>
</html>
